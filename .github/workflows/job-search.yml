name: Job Search

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules are UTC. Run hourly at :17 to avoid the busiest
    # top-of-hour scheduler window; the report gate below uses the intended
    # schedule time, not the delayed runner start time.
    - cron: "17 * * * *"

concurrency:
  group: job-search
  cancel-in-progress: false

jobs:
  search:
    runs-on: ubuntu-latest
    env:
      ENTRIES_NUMBER_LIMIT: ${{ vars.ENTRIES_NUMBER_LIMIT || vars.JOB_SEARCH_LIMIT || '8' }}
      JOB_SEARCH_MAX_PAGES: ${{ vars.JOB_SEARCH_MAX_PAGES || '2' }}
      JOB_SEARCH_REQUEST_DELAY: ${{ vars.JOB_SEARCH_REQUEST_DELAY || '2' }}
      JOB_SEARCH_EFFECTIVE_LIMIT: ${{ vars.JOB_SEARCH_EFFECTIVE_LIMIT || '8' }}
      JOB_MATCHER_MODE: ${{ vars.JOB_MATCHER_MODE || 'mock' }}
      CHEAT_MODE: ${{ vars.CHEAT_MODE || 'false' }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-mini' }}
      RUNTIME_RESULTS_DIR: runtime_results
    steps:
      - name: Resolve schedule gates
        id: schedule_gate
        shell: bash
        run: |
          event_name="${{ github.event_name }}"
          event_schedule="${{ github.event.schedule }}"
          local_time="$(TZ=Europe/Stockholm date '+%Y-%m-%d %H:%M:%S %Z')"

          if [[ "$event_name" == "workflow_dispatch" ]]; then
            echo "run_job=true" >> "$GITHUB_OUTPUT"
            echo "report_job=true" >> "$GITHUB_OUTPUT"
            echo "Running manually triggered job-search workflow with reporting at ${local_time}."
            exit 0
          fi

          cron_minute="$(awk '{print $1}' <<< "$event_schedule")"
          cron_hour="$(awk '{print $2}' <<< "$event_schedule")"
          if [[ "$cron_hour" == "*" ]]; then
            cron_hour="$(date -u +%H)"
          fi
          utc_date="$(date -u +%Y-%m-%d)"
          scheduled_utc_time="${utc_date} ${cron_hour}:${cron_minute} UTC"
          scheduled_local_hour="$(TZ=Europe/Stockholm date -d "$scheduled_utc_time" +%H)"
          scheduled_local_time="$(TZ=Europe/Stockholm date -d "$scheduled_utc_time" '+%Y-%m-%d %H:%M %Z')"

          echo "run_job=true" >> "$GITHUB_OUTPUT"
          echo "Running hourly job-search workflow for scheduled local time ${scheduled_local_time}; runner started at ${local_time}."

          if [[ "$scheduled_local_hour" == "07" || "$scheduled_local_hour" == "19" ]]; then
            echo "report_job=true" >> "$GITHUB_OUTPUT"
            echo "Telegram reporting is enabled for this scheduled local hour."
          else
            echo "report_job=false" >> "$GITHUB_OUTPUT"
            echo "Telegram reporting is skipped; scheduled local time ${scheduled_local_time} is not in the 07 or 19 Europe/Stockholm hour."
          fi

      - name: Checkout
        if: steps.schedule_gate.outputs.run_job == 'true'
        uses: actions/checkout@v4

      - name: Setup Python
        if: steps.schedule_gate.outputs.run_job == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install rclone
        if: steps.schedule_gate.outputs.run_job == 'true'
        shell: bash
        run: |
          sudo -v
          curl https://rclone.org/install.sh | sudo bash

      - name: Configure Koofr
        if: steps.schedule_gate.outputs.run_job == 'true'
        env:
          KOOFR_EMAIL: ${{ secrets.KOOFR_EMAIL }}
          KOOFR_APP_PASSWORD: ${{ secrets.KOOFR_APP_PASSWORD }}
          KOOFR_PATH: ${{ secrets.KOOFR_PATH }}
        shell: bash
        run: |
          if [[ -z "$KOOFR_EMAIL" || -z "$KOOFR_APP_PASSWORD" || -z "$KOOFR_PATH" ]]; then
            echo "Missing Koofr secrets. Expected KOOFR_EMAIL, KOOFR_APP_PASSWORD, and KOOFR_PATH."
            exit 1
          fi

          mkdir -p ~/.config/rclone
          obscured_password="$(rclone obscure "$KOOFR_APP_PASSWORD")"
          printf '[koofr]\ntype = koofr\nprovider = koofr\nuser = %s\npassword = %s\n' \
            "$KOOFR_EMAIL" "$obscured_password" > ~/.config/rclone/rclone.conf

          rclone mkdir "koofr:${KOOFR_PATH}"

      - name: Download result memory from Koofr
        if: steps.schedule_gate.outputs.run_job == 'true'
        env:
          KOOFR_PATH: ${{ secrets.KOOFR_PATH }}
          RUNTIME_RESULTS_DIR: ${{ env.RUNTIME_RESULTS_DIR }}
        shell: bash
        run: |
          mkdir -p "${RUNTIME_RESULTS_DIR}/discard" "${RUNTIME_RESULTS_DIR}/hits"
          rclone copy "koofr:${KOOFR_PATH}" "${RUNTIME_RESULTS_DIR}" --create-empty-src-dirs

      - name: Run tests
        if: steps.schedule_gate.outputs.run_job == 'true'
        run: |
          python3 -m unittest
          python3 -m py_compile linkedin_guest_jobs.py match_jobs.py telegram_notify.py

      - name: Generating search url
        if: steps.schedule_gate.outputs.run_job == 'true'
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          import linkedin_guest_jobs as jobs

          search_urls = jobs.search_urls_from_config(jobs.load_search_config(Path("linkedin_search_input.json")))
          for index, search_url in enumerate(search_urls, start=1):
              print(f"LinkedIn search URL {index}: {search_url}")
              print(f"LinkedIn guest search URL {index}: {jobs.guest_search_url(search_url)}")
          PY

      - name: Scrape new jobs
        if: steps.schedule_gate.outputs.run_job == 'true'
        id: scrape
        env:
          RUNTIME_RESULTS_DIR: ${{ env.RUNTIME_RESULTS_DIR }}
          ENTRIES_NUMBER_LIMIT: ${{ env.ENTRIES_NUMBER_LIMIT }}
          JOB_SEARCH_MAX_PAGES: ${{ env.JOB_SEARCH_MAX_PAGES }}
          JOB_SEARCH_REQUEST_DELAY: ${{ env.JOB_SEARCH_REQUEST_DELAY }}
          JOB_SEARCH_EFFECTIVE_LIMIT: ${{ env.JOB_SEARCH_EFFECTIVE_LIMIT }}
        shell: bash
        run: |
          effective_limit="${ENTRIES_NUMBER_LIMIT}"
          max_effective_limit="${JOB_SEARCH_EFFECTIVE_LIMIT:-8}"
          if (( effective_limit > max_effective_limit )); then
            echo "Capping scrape limit from ${effective_limit} to ${max_effective_limit} to avoid LinkedIn throttling."
            effective_limit="${max_effective_limit}"
          fi

          set +e
          python3 linkedin_guest_jobs.py \
            --results-root "${RUNTIME_RESULTS_DIR}" \
            --limit "${effective_limit}" \
            --max-pages "${JOB_SEARCH_MAX_PAGES}" \
            --request-delay "${JOB_SEARCH_REQUEST_DELAY}" \
            --output linkedin_jobs_sample.json 2>&1 | tee scrape.log
          scrape_status="${PIPESTATUS[0]}"
          set -e

          if [[ "$scrape_status" -ne 0 ]]; then
            if grep -q "No new public job cards found" scrape.log; then
              echo "new_jobs=false" >> "$GITHUB_OUTPUT"
              echo "No new jobs found."
              exit 0
            fi
            exit "$scrape_status"
          fi

          scrape_path="$(grep -m1 '^Wrote ' scrape.log | sed 's/^Wrote //')"
          if [[ -z "$scrape_path" || ! -f "$scrape_path" ]]; then
            echo "Scrape completed but no output JSON path was found."
            exit 1
          fi

          echo "new_jobs=true" >> "$GITHUB_OUTPUT"
          echo "scrape_path=${scrape_path}" >> "$GITHUB_OUTPUT"

      - name: Classify new jobs
        if: steps.schedule_gate.outputs.run_job == 'true' && steps.scrape.outputs.new_jobs == 'true'
        env:
          RUNTIME_RESULTS_DIR: ${{ env.RUNTIME_RESULTS_DIR }}
          SCRAPE_PATH: ${{ steps.scrape.outputs.scrape_path }}
          JOB_MATCHER_MODE: ${{ env.JOB_MATCHER_MODE }}
          OPENAI_MODEL: ${{ env.OPENAI_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JOB_PROFILE_PATH: ${{ env.RUNTIME_RESULTS_DIR }}/job_profile.rtf
        run: |
          if [[ "$JOB_MATCHER_MODE" == "openai" && -z "$OPENAI_API_KEY" ]]; then
            echo "OPENAI_API_KEY is required when JOB_MATCHER_MODE=openai."
            exit 1
          fi
          if [[ "$JOB_MATCHER_MODE" == "openai" && ! -f "$JOB_PROFILE_PATH" ]]; then
            echo "Job profile file is required when JOB_MATCHER_MODE=openai: ${JOB_PROFILE_PATH}"
            exit 1
          fi

          python3 match_jobs.py \
            --input "$SCRAPE_PATH" \
            --output-root "$RUNTIME_RESULTS_DIR" \
            --matcher "$JOB_MATCHER_MODE" \
            --openai-model "$OPENAI_MODEL" \
            --job-profile "$JOB_PROFILE_PATH"

      - name: Send Telegram summary
        if: always() && steps.schedule_gate.outputs.report_job == 'true'
        env:
          RUNTIME_RESULTS_DIR: ${{ env.RUNTIME_RESULTS_DIR }}
          SCRAPE_PATH: ${{ steps.scrape.outputs.scrape_path }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: bash
        run: |
          args=(--results-root "$RUNTIME_RESULTS_DIR" --hours 12)
          if [[ -n "$SCRAPE_PATH" ]]; then
            args+=(--current-input "$SCRAPE_PATH")
          fi

          python3 telegram_notify.py "${args[@]}"

      - name: Upload result memory to Koofr
        if: always() && steps.schedule_gate.outputs.run_job == 'true'
        env:
          KOOFR_PATH: ${{ secrets.KOOFR_PATH }}
          RUNTIME_RESULTS_DIR: ${{ env.RUNTIME_RESULTS_DIR }}
        shell: bash
        run: |
          if [[ ! -d "$RUNTIME_RESULTS_DIR" ]]; then
            echo "Skipping Koofr upload: ${RUNTIME_RESULTS_DIR} does not exist."
            exit 0
          fi

          rclone copy "$RUNTIME_RESULTS_DIR" "koofr:${KOOFR_PATH}" --create-empty-src-dirs
